services:
  selfrunner:
    build: .
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./config.yaml:/etc/gso/config.yaml:ro
    restart: unless-stopped
    # Uncomment to use Docker secrets instead of env vars:
